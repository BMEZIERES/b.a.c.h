<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B.A.C.H</title>

  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 90px;
    }

    #container {
      position: relative;
      margin-top: 20px;
      transform-origin: center top;
    }

    /* Le livre s’adapte à l’écran */
    #book {
      width: min(95vw, 1200px);
      height: calc(min(95vw, 1200px) * 0.67);
    }

    /* Zones clic UNIQUEMENT sur desktop */
    @media (hover: hover) and (pointer: fine) {
      .zone {
        position: absolute;
        top: 0;
        width: 50%;
        height: 100%;
        z-index: 2;
        cursor: pointer;
      }
      .left { left: 0; }
      .right { right: 0; }
    }

    .controls {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.9);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    button {
      padding: 10px 12px;
      font-size: 16px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      background: white;
    }
  </style>
</head>

<body>

  <div id="container">
    <div id="book"></div>

    <div class="zone left" onclick="prevPage()"></div>
    <div class="zone right" onclick="nextPage()"></div>
  </div>

  <div class="controls">
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
    <button onclick="toggleFullscreen()">⛶</button>
  </div>

<script>
  let pageFlip;

  const isMobile = window.matchMedia("(max-width: 768px)").matches;

  window.onload = () => {
    const bookEl = document.getElementById("book");
    const width = bookEl.clientWidth;
    const height = bookEl.clientHeight;

    pageFlip = new St.PageFlip(bookEl, {
      width: isMobile ? width : width / 2,
      height: height,
      size: "fixed",
      showCover: true,
      usePortrait: isMobile,   // ✅ 1 page sur mobile, 2 pages sur PC
      mobileScrollSupport: true
    });

    pageFlip.loadFromImages([
      "Bach16 -01.jpg",
      "Bach16 -02.jpg",
      "Bach16 -03.jpg",
      "Bach16 -04.jpg",
      "Bach16 -05.jpg",
      "Bach16 -06.jpg",
      "Bach16 -07.jpg",
      "Bach16 -08.jpg",
      "Bach16 -09.jpg",
      "Bach16 -10.jpg",
      "Bach16 -11.jpg",
      "Bach16 -12.jpg",
      "Bach16 -13.jpg",
      "Bach16 -14.jpg",
      "Bach16 -15.jpg"
    ]);
  };

  function nextPage() { pageFlip?.flipNext(); }
  function prevPage() { pageFlip?.flipPrev(); }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
